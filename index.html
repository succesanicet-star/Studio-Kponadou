<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Studio Kponadou - Agence digitale premium. Création de sites internet haut de gamme, vitrines et e-commerce optimisés pour la conversion et le SEO.">
    <title>Studio Kponadou | Agence Web Digitale Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* DESIGN SYSTEM & VARIABLES PREMIUM */
        :root {
            --bg-main: #060913;
            --bg-card: #0f1626;
            --bg-card-hover: #17223b;
            --accent-cyan: #00f2fe;
            --accent-blue: #0072ff;
            --accent-gold: #f5af19;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.5);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* UTILITIES & TITLES */
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .section-title span {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 50px auto;
            font-size: 1.05rem;
        }

        /* HEADER & NAVIGATION GLASSMORPHISM */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(6, 9, 19, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-family: var(--font-family);
            font-weight: 600;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 100px;
            transition: var(--transition-smooth);
        }

        nav button:hover, nav button.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        nav button.active {
            color: var(--accent-cyan);
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .cta-header {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #030712;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            border: none;
            cursor: pointer;
        }

        .cta-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
        }

        /* MAIN APP CONTAINER */
        main {
            margin-top: 110px;
            padding: 40px 8%;
            min-height: calc(100vh - 110px);
        }

        .section {
            display: none;
            animation: sectionAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .section.active {
            display: block;
        }

        @keyframes sectionAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HERO SECTION */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
            padding: 40px 0 80px 0;
        }

        .hero-content {
            flex: 1.1;
        }

        .badge-premium {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 242, 254, 0.06);
            border: 1px solid rgba(0, 242, 254, 0.15);
            color: var(--accent-cyan);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .hero-content h1 {
            font-size: 3.8rem;
            line-height: 1.15;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 25px;
        }

        .hero-content h1 span {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 40px;
            max-width: 580px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), #f37335);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            font-family: var(--font-family);
            padding: 18px 36px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(245, 175, 25, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            font-family: var(--font-family);
            padding: 18px 36px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .hero-image {
            flex: 0.9;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-blue);
            filter: blur(130px);
            opacity: 0.25;
            top: 10%;
            left: 10%;
            z-index: 1;
        }

        .hero-image img {
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-premium);
            position: relative;
            z-index: 2;
        }

        /* SERVICES CARDS */
        .services-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 40px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .service-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.2);
            box-shadow: var(--shadow-premium);
        }

        .service-card .icon-wrap {
            font-size: 2rem;
            margin-bottom: 25px;
            display: inline-block;
        }

        .service-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .service-price-tag {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent-gold);
            background: rgba(245, 175, 25, 0.08);
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
        }

        /* PORTFOLIO GRID (6 PROJETS PARFAITEMENT ALIGNÉS) */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        .portfolio-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: var(--transition-smooth);
            height: 380px;
            position: relative;
        }

        .portfolio-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .portfolio-card:hover img {
            transform: scale(1.08);
        }

        .portfolio-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 35px 30px;
            background: linear-gradient(to top, rgba(6, 9, 19, 0.98) 60%, rgba(6, 9, 19, 0.4) 80%, rgba(6, 9, 19, 0));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .portfolio-info h4 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .portfolio-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .tag-tech {
            display: inline-flex;
            gap: 8px;
        }

        .tag-tech span {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 50px;
            color: #fff;
            font-weight: 500;
        }

        /* CONFIGURATEUR DE DEVIS AUTOMATISÉ (100$ - 1500$) */
        .interactive-box {
            background: var(--bg-card);
            max-width: 650px;
            margin: 0 auto;
            border-radius: 24px;
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: var(--shadow-premium);
        }

        .field-group {
            margin-bottom: 25px;
        }

        .field-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        select, input, textarea {
            width: 100%;
            padding: 14px 18px;
            background: #060a14;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-family: var(--font-family);
            transition: var(--transition-smooth);
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        .price-output {
            background: rgba(0, 242, 254, 0.03);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin: 35px 0;
            border: 1px dashed rgba(0, 242, 254, 0.2);
        }

        .price-output p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .price-output .amount {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent-cyan);
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        /* TESTIMONIALS CARDS */
        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .review-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .review-text {
            font-style: italic;
            color: #e2e8f0;
            margin-bottom: 25px;
            font-size: 0.98rem;
        }

        .review-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .review-user .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        .review-info h5 {
            font-size: 1rem;
            font-weight: 700;
        }

        .review-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* FLOATING WHATSAPP BUTTON */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 999;
            transition: var(--transition-smooth);
        }

        .whatsapp-float:hover {
            transform: scale(1.1) rotate(10deg);
        }

        .whatsapp-float svg {
            width: 30px;
            height: 30px;
            fill: #fff;
        }

        /* COMPLETE FOOTER SYSTEMS */
        footer {
            background: #03060f;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 70px 8% 30px 8%;
            margin-top: 100px;
        }

        .footer-cols {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 40px;
            margin-bottom: 50px;
        }

        .footer-logo-box h4 {
            font-size: 1.4rem;
            margin-bottom: 15px;
        }

        .footer-logo-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            max-width: 250px;
        }

        .footer-links h5 {
            font-size: 1.05rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links ul li {
            margin-bottom: 12px;
        }

        .footer-links ul li a {
            color: var(--text-muted);
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }

        .footer-links ul li a:hover {
            color: var(--accent-cyan);
            padding-left: 5px;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 30px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* PERFECT RESPONSIVE BREAKPOINTS */
        @media (max-width: 1024px) {
            header { padding: 20px 5%; }
            main { padding: 40px 5%; }
            .hero { gap: 30px; }
            .hero-content h1 { font-size: 3rem; }
        }

        @media (max-width: 768px) {
            nav { display: none; } /* Mobile Navigation clean layout */
            .hero { flex-direction: column; text-align: center; padding-bottom: 40px; }
            .hero-content p { margin: 0 auto 30px auto; }
            .btn-group { flex-direction: column; gap: 12px; width: 100%; }
            .btn-primary, .btn-secondary { width: 100%; text-align: center; }
            .hero-image img { max-width: 100%; }
            .interactive-box { padding: 30px 20px; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
