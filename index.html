<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Studio Kponadou - Création de sites web vitrines et e-commerce premium, ultra-rapides et optimisés SEO pour PME et indépendants.">
    <title>Studio Kponadou | Agence Web Digitale Haute Couture</title>
    <style>
        /* CSS VARIABLE & CORE RESET */
        :root {
            --bg-main: #0a0f1d;
            --bg-card: #131c31;
            --accent-cyan: #00f2fe;
            --accent-gold: #f5af19;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* PREMIUM HEADER & NAVIGATION */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 15, 29, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-cyan), #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 4px;
            position: relative;
        }

        nav button:hover, nav button.active {
            color: var(--accent-cyan);
        }

        nav button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .cta-header {
            background: linear-gradient(135deg, var(--accent-cyan), #0072ff);
            color: #000;
            font-weight: 700;
            padding: 10px 22px;
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cta-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        /* CONTAINER LAYOUT */
        main {
            margin-top: 100px;
            min-height: calc(100vh - 100px);
            padding: 20px 5%;
        }

        .section {
            display: none;
            animation: fadeIn 0.6s ease forwards;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SECTION HERO (ACCUEIL) */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            padding: 60px 0;
        }

        .hero-content {
            flex: 1;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .hero-content h1 span {
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 35px;
            max-width: 550px;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), #f37335);
            color: #fff;
            font-weight: 700;
            padding: 16px 32px;
            border-radius: 8px;
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(245, 175, 25, 0.3);
        }

        .btn-secondary {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s ease;
            background: none;
            color: #fff;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* GRID CARDS (SERVICES) */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 35px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 254, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #fff;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* GALLERY & PORTFOLIO (MINIMUM 6 PROJETS) */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .portfolio-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: var(--bg-card);
        }

        .portfolio-item img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .portfolio-item:hover img {
            transform: scale(1.06);
        }

        .portfolio-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(10,15,29,0.95) 70%, rgba(10,15,29,0));
        }

        /* AUTOMATED QUOTE CALCULATOR (OPTIMISÉ 100$ - 1500$) */
        .quote-box {
            background: var(--bg-card);
            max-width: 600px;
            margin: 40px auto;
            padding: 45px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #fff;
        }

        select, input, textarea {
            width: 100%;
            padding: 14px;
            background: #0a1120;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--accent-cyan);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .price-display {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-cyan);
            text-align: center;
            margin: 30px 0;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .automation-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 242, 254, 0.1);
            color: var(--accent-cyan);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* FOOTER */
        footer {
            margin-top: 80px;
            padding: 40px 5%;
            background: #060913;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* RESPONSIVE SMARTPHONES & TABLETS */
        @media (max-width: 968px) {
            header { padding: 15px 5%; }
            nav { display: none; }
            .hero { flex-direction: column; text-align: center; padding: 30px 0; }
            .hero-content h1 { font-size: 2.3rem; }
            .hero-content p { margin: 20px auto; }
            .btn-group { flex
