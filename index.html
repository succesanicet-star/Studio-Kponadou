<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Studio Kponadou - Agence digitale d'élite spécialisée dans la création de sites web premium, tunnels e-commerce et applications mobiles performantes.">
    <title>Studio Kponadou | Agence Web & Design Premium</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    
    <style>
        /* 🎨 DESIGN SYSTEM & VARIABLES PREMIUM */
        :root {
            --bg-dark: #070a13;
            --bg-card: #0f1526;
            --bg-input: #0a0e1a;
            --cyan: #00f2fe;
            --blue-glow: #4facfe;
            --gold: #f5af19;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 🚀 SCROLLBAR PREMIUM */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

        /* 🧭 HEADER & NAVIGATION FLUIDE */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(7, 10, 19, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, var(--cyan), var(--blue-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 100px;
            gap: 5px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 22px;
            border-radius: 100px;
            transition: var(--transition);
        }

        nav button:hover, nav button.active {
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.07);
        }

        nav button.active {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.15), rgba(79, 172, 254, 0.15));
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: var(--cyan);
        }

        .cta-header {
            background: var(--text-white);
            color: var(--bg-dark);
            font-weight: 700;
            font-size: 0.9rem;
            padding: 12px 24px;
            border-radius: 100px;
            text-decoration: none;
            transition: var(--transition);
        }

        .cta-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
        }

        /* 📦 MAIN WRAPPER */
        main {
            margin-top: 100px;
            min-height: calc(100vh - 100px);
            padding: 40px 8%;
        }

        .section {
            display: none;
            animation: sectionReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .section.active {
            display: block;
        }

        @keyframes sectionReveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🏠 SECTION ACCUEIL (HERO) */
        .hero-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
            padding: 60px 0;
        }

        .hero-left {
            flex: 1.2;
        }

        .badge-premium {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 242, 254, 0.06);
            border: 1px solid rgba(0, 242, 254, 0.2);
            color: var(--cyan);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-left h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -2px;
            margin-bottom: 25px;
        }

        .hero-left h1 span {
            background: linear-gradient(120deg, var(--cyan), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-left p {
            color: var(--text-gray);
            font-size: 1.2rem;
            margin-bottom: 40px;
            max-width: 580px;
        }

        .hero-right {
            flex: 0.8;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-right img {
            width: 100%;
            max-width: 460px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .btn-flex {
            display: flex;
            gap: 20px;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #e65c00);
            color: var(--text-white);
            font-weight: 700;
            padding: 18px 36px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(245, 175, 25, 0.2);
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 175, 25, 0.4);
        }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: var(--text-white);
            font-weight: 600;
            padding: 18px 36px;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-white);
        }

        /* 🛠️ GRID CARDS (SERVICES & GRILLES) */
        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .section-desc {
            text-align: center;
            color: var(--text-gray);
            max-width: 600px;
            margin: 0 auto 50px auto;
            font-size: 1.05rem;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 40px;
            transition: var(--transition);
            position: relative;
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 242, 254, 0.25);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.05);
        }

        .icon-wrapper {
            width: 60px;
            height: 60px;
            background: rgba(0, 242, 254, 0.06);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cyan);
            margin-bottom: 25px;
        }

        .icon-wrapper .material-symbols-out-lined {
            font-size: 2rem;
        }

        .service-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .service-card p {
            color: var(--text-gray);
            font-size: 1rem;
        }

        /* 🖼️ GALERIE PORTFOLIO MODERNE (6 REALISATIONS ALIGNÉES) */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        .portfolio-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            height: 380px;
            transition: var(--transition);
        }

        .portfolio-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .portfolio-card:hover img {
            transform: scale(1.08);
        }

        .portfolio-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 35px 30px;
            background: linear-gradient(to top, rgba(7, 10, 19, 0.98) 60%, rgba(7, 10, 19, 0));
            transform: translateY(10px);
            transition: var(--transition);
        }

        .portfolio-card:hover .portfolio-info {
            transform: translateY(0);
        }

        .tag-project {
            display: inline-block;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--cyan);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .portfolio-info h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .portfolio-info p {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        /* 💰 CALCULATEUR DE DEVIS INTELLIGENT (100$-1500$) */
        .box-premium {
            background: var(--bg-card);
            max-width: 680px;
            margin: 0 auto;
            padding: 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-white);
        }

            width: 100%;
            padding: 16px 20px;
            background: var(--bg-input);

            border-
